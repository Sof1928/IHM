<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h4 class="text-lg font-semibold text-slate-900">Utilisateurs</h4>
      <p class="text-sm text-slate-500">Vue globale des comptes crees.</p>
    </div>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="text-left text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="py-3 font-medium">Nom</th>
          <th class="py-3 font-medium">Email</th>
          <th class="py-3 font-medium">Role</th>
          <th class="py-3 text-right font-medium">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users()" class="border-b border-slate-100">
          <td class="py-3">
            <div class="font-semibold text-slate-900">{{ user.nom }} {{ user.prenom }}</div>
          </td>
          <td class="py-3 text-slate-600">{{ user.email }}</td>
          <td class="py-3">
            <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">{{ user.role }}</span>
          </td>
          <td class="py-3 text-right">
            <button
              class="rounded-full border border-red-200 px-3 py-1 text-xs font-semibold text-red-600 hover:border-red-400"
              (click)="remove(user.id)"
            >
              Supprimer
            </button>
          </td>
        </tr>
        <tr *ngIf="users().length === 0">
          <td colspan="4" class="py-6 text-center text-slate-400">Aucun utilisateur</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="mt-4 rounded-lg border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-600" *ngIf="error()">
    {{ error() }}
  </div>
</div>
