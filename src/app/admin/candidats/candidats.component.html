<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="mb-4">
    <h4 class="text-lg font-semibold text-slate-900">Candidats</h4>
    <p class="text-sm text-slate-500">Gestion des profils candidats.</p>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="text-left text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="py-3 font-medium">Nom</th>
          <th class="py-3 font-medium">Email</th>
          <th class="py-3 font-medium">Telephone</th>
          <th class="py-3 font-medium">Niveau</th>
          <th class="py-3 font-medium">Experience</th>
          <th class="py-3 text-right font-medium">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let candidat of candidats()" class="border-b border-slate-100">
          <td class="py-3">
            <div class="font-semibold text-slate-900">{{ candidat.nom }} {{ candidat.prenom }}</div>
            <div class="text-xs text-slate-400">{{ candidat.adresse }}</div>
          </td>
          <td class="py-3 text-slate-600">{{ candidat.email }}</td>
          <td class="py-3 text-slate-600">{{ candidat.telephone }}</td>
          <td class="py-3 text-slate-600">{{ candidat.niveauEtude }}</td>
          <td class="py-3 text-slate-600">{{ candidat.experience }} ans</td>
          <td class="py-3 text-right">
            <button
              class="rounded-full border border-red-200 px-3 py-1 text-xs font-semibold text-red-600 hover:border-red-400"
              (click)="remove(candidat.id)"
            >
              Supprimer
            </button>
          </td>
        </tr>
        <tr *ngIf="candidats().length === 0">
          <td colspan="6" class="py-6 text-center text-slate-400">Aucun candidat</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="mt-4 rounded-lg border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-600" *ngIf="error()">
    {{ error() }}
  </div>
</div>
