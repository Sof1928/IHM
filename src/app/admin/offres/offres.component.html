<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h4 class="text-lg font-semibold text-slate-900">Offres (admin)</h4>
      <p class="text-sm text-slate-500">Controle global des offres publiees.</p>
    </div>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="text-left text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="py-3 font-medium">Titre</th>
          <th class="py-3 font-medium">Localisation</th>
          <th class="py-3 font-medium">Statut</th>
          <th class="py-3 text-right font-medium">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let offre of offres()" class="border-b border-slate-100">
          <td class="py-3 font-semibold text-slate-900">{{ offre.titre }}</td>
          <td class="py-3 text-slate-600">{{ offre.localisation }}</td>
          <td class="py-3">
            <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">{{ offre.statut }}</span>
          </td>
          <td class="py-3 text-right">
            <button
              class="rounded-full border border-red-200 px-3 py-1 text-xs font-semibold text-red-600 hover:border-red-400"
              (click)="remove(offre.idOffre)"
            >
              Supprimer
            </button>
          </td>
        </tr>
        <tr *ngIf="offres().length === 0">
          <td colspan="4" class="py-6 text-center text-slate-400">Aucune offre</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="mt-4 rounded-lg border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-600" *ngIf="error()">
    {{ error() }}
  </div>
</div>
