<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-3">Profil candidat</h4>
        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="form-floating mb-3">
            <input class="form-control" id="adresse" formControlName="adresse" />
            <label for="adresse">Adresse</label>
          </div>
          <div class="form-floating mb-3">
            <input type="date" class="form-control" id="dateNaissance" formControlName="dateNaissance" />
            <label for="dateNaissance">Date de naissance</label>
          </div>
          <div class="form-floating mb-3">
            <input class="form-control" id="niveauEtude" formControlName="niveauEtude" />
            <label for="niveauEtude">Niveau d'etude</label>
          </div>
          <div class="form-floating mb-3">
            <input type="number" class="form-control" id="experience" formControlName="experience" />
            <label for="experience">Experience (annees)</label>
          </div>
          <button type="submit" class="btn btn-primary">Mettre a jour</button>
        </form>
      </div>
    </div>

    <div class="card mt-3">
      <div class="card-body">
        <h4 class="mb-3">CV</h4>
        <input type="file" class="form-control" (change)="onFileSelected($event)" accept="application/pdf" />
        <button class="btn btn-outline-primary mt-3" (click)="uploadCv()">Uploader</button>
        <ul class="mt-3" *ngIf="profile()?.cvs?.length">
          <li *ngFor="let cv of profile()?.cvs">{{ cv.nomFichier }} - {{ cv.dateAjout | date: 'short' }}</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-3">Lettre de motivation</h4>
        <form [formGroup]="lettreForm" (ngSubmit)="addLettre()">
          <div class="form-floating mb-3">
            <textarea class="form-control" id="lettre" formControlName="contenu" style="height: 150px"></textarea>
            <label for="lettre">Contenu</label>
          </div>
          <button class="btn btn-primary" type="submit">Ajouter</button>
        </form>
        <ul class="mt-3" *ngIf="profile()?.lettres?.length">
          <li *ngFor="let lettre of profile()?.lettres">{{ lettre.dateAjout | date: 'short' }}</li>
        </ul>
      </div>
    </div>

    <div class="alert alert-danger mt-3" *ngIf="error()">
      {{ error() }}
    </div>
  </div>
</div>
